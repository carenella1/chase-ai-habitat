{% extends "base.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">

<div class="chat-layout">

    <!-- MAIN CHAT -->
    <div class="chat-main chat-panel">

        <div class="chat-panel-header">
            <div class="chat-header-left">
                <span class="chat-nex-name" id="chat-nex-name">NEXARION</span>
                <span class="chat-cycle-pill" id="chat-cycle-pill"></span>
            </div>
            <div class="chat-header-right">
                <button id="trace-toggle-btn" class="chat-btn chat-btn-trace" title="Toggle thinking trace">
                    <span class="trace-icon">◈</span> TRACE <span class="trace-state">OFF</span>
                </button>
            </div>
        </div>

        <div id="chat-thread"></div>

        <div class="chat-input-area">
            <input id="chat-input" placeholder="Speak to Nexarion..." />
            <button id="send-btn" class="chat-btn primary">Send</button>
            <button id="mic-btn" class="chat-btn" title="Voice input">🎤</button>
            <button id="mode-toggle" class="chat-btn" title="Orb Mode">Orb</button>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="chat-right-panel">
        <div class="panel">
            <h3 class="panel-title">Conversations</h3>
            <button id="new-chat-btn" class="chat-btn" style="margin-bottom:10px;width:100%;">
                + New Chat
            </button>
            <div id="chat-list"></div>
        </div>

        <!-- LIVE CONTEXT PANEL -->
        <div class="panel" id="live-context-panel" style="margin-top:14px">
            <h3 class="panel-title">Live Context</h3>
            <div class="ctx-row">
                <span class="ctx-label">CYCLE</span>
                <span class="ctx-val" id="ctx-cycle">—</span>
            </div>
            <div class="ctx-row">
                <span class="ctx-label">ACTIVE GOAL</span>
                <span class="ctx-val ctx-goal" id="ctx-goal">—</span>
            </div>
            <div class="ctx-row">
                <span class="ctx-label">TOP TOPIC</span>
                <span class="ctx-val" id="ctx-topic">—</span>
            </div>
            <div class="ctx-row">
                <span class="ctx-label">BELIEFS HELD</span>
                <span class="ctx-val" id="ctx-beliefs">—</span>
            </div>
            <div class="ctx-row">
                <span class="ctx-label">DOMAIN</span>
                <span class="ctx-val" id="ctx-domain">—</span>
            </div>
        </div>
    </div>

</div>

<!-- ORB MODE OVERLAY -->
<div id="orb-overlay">

    <div id="orb-rings">
        <div class="orb-ring ring-1"></div>
        <div class="orb-ring ring-2"></div>
        <div class="orb-ring ring-3"></div>
    </div>

    <div id="nexarion-orb"></div>

    <div id="orb-status-text">Nexarion is ready</div>

    <div id="orb-response-text"></div>

    <div id="orb-hint">Tap the orb or use the mic to speak</div>

    <button id="exit-orb" class="chat-btn">&#x2715; Exit Orb Mode</button>

</div>

{% endblock %}

{% block scripts %}
<script type="module" src="/static/js/chat.js"></script>
{% endblock %}
