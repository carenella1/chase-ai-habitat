<!DOCTYPE html>
<html>
<head>
<title>Chase AI Habitat</title>

<style>

body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: Arial;
    padding: 40px;
}

h1 {
    color: #38bdf8;
}

.panel {
    background: #1e293b;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 8px;
}

pre {
    white-space: pre-wrap;
}

</style>

</head>

<body>

<h1>Chase AI Habitat</h1>

<div class="panel">
<h2>System State</h2>
<pre>{{ data.system }}</pre>
</div>

<div class="panel">
<h2>Memory</h2>
<pre>{{ data.memory }}</pre>
</div>

<div class="panel">
<h2>Research Programs</h2>
<pre>{{ data.research_programs }}</pre>
</div>

<div class="panel">
<h2>Evolution Queue</h2>
<pre>{{ data.evolution_queue }}</pre>
</div>

<div class="panel">
<h2>Recent Activity</h2>
<pre>{{ data.recent_activity }}</pre>
</div>

</body>
</html>
